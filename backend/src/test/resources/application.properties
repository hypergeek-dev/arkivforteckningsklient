spring.application.name=ihpappbackend
defaultUser=defaultuser
environment=local
truststore.location=/opt/keystores/Trust.jks
javax.net.ssl.trustStore=/opt/keystores/Trust.jks
javax.net.ssl.trustStorePassword=password
spring.datasource.username=dittanvändarnamn
spring.datasource.password=dittlösenord
spring.datasource.jdbc-url=jdbc:postgresql://db:5432/ihp
spring.jpa.hibernate.ddl-auto=none
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.default_schema=ihp
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.maximum-pool-size=100
spring.datasource.minimum-idle=100
#---
spring.config.activate.on-profile=k8s

