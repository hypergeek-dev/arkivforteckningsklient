spring.application.name=ihpappbackend

# Environment profile: "local" enables mock IAM (all actions permitted without login).
# Default is "production" — set ENVIRONMENT=local explicitly for development.
environment=${ENVIRONMENT:production}

# Default user for audit trail in local/mock mode only
defaultUser=${DEFAULT_USER:devuser}

# Truststore (optional; only required when connecting to PKI-protected services)
truststore.location=${TRUSTSTORE_LOCATION:/opt/keystores/Trust.jks}
javax.net.ssl.trustStore=${TRUSTSTORE_LOCATION:/opt/keystores/Trust.jks}
javax.net.ssl.trustStorePassword=${TRUSTSTORE_PASSWORD:changeit}

# Database — all values should come from environment variables
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ihpuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ihppassword}
spring.datasource.jdbc-url=${SPRING_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/ihp}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.default_schema=ihp
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway — manages schema migrations automatically at startup
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=ihp
spring.flyway.default-schema=ihp
spring.flyway.baseline-on-migrate=false
spring.flyway.out-of-order=false
spring.flyway.validate-on-migrate=true

springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.url=/v3/api-docs
springdoc.packagesToScan=se.migrationsverket.ihpservice.api.rest.v1
# Swagger disabled by default — enable explicitly in dev/staging via SWAGGER_ENABLED=true
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}

# Multipart upload limits — prevents heap exhaustion from large or malformed JSON imports
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

server.forward-headers-strategy=framework

# Actuator — show health details only to authenticated users in production
management.endpoint.health.show-details=when-authorized
management.endpoints.web.exposure.include=startup,prometheus,metrics,info,health
management.endpoint.health.probes.enabled=true
management.endpoint.health.group.readiness.include=readinessState,db
management.endpoint.health.group.readiness.show-details=when-authorized
management.endpoint.prometheus.access=read_only
management.endpoint.info.access=unrestricted
management.endpoint.metrics.access=read_only
