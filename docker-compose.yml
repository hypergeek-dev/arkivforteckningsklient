services:
  # Databas-tjänst
  db:
    image: postgres:16.9
    restart: always
    container_name: min-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ihp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ihp"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8.14
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_AUTO_CREATE_APPLY_FIXES: "true"
    ports:
      - "127.0.0.1:8082:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    configs:
      - source: pgadmin-servers
        target: /pgadmin4/servers.json
    depends_on:
      db:
        condition: service_healthy

  # Backend-tjänst (Spring Boot)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ihp-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_JDBC_URL: jdbc:postgresql://db:5432/ihp
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      # IMPORTANT: Must be "production" for all non-local deployments.
      # Setting this to "local" enables mock IAM — all actions are permitted without authentication.
      ENVIRONMENT: ${ENVIRONMENT:-production}
    depends_on:
      db:
        condition: service_healthy

  # Frontend-tjänst (React/TypeScript)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ihp-frontend
    ports:
      - "8081:8081"
    depends_on:
      - backend

volumes:
  postgres_data:
  pgadmin_data:


configs:
  pgadmin-servers:
    content: |
      {
        "Servers": {
          "1": {
            "Name": "ihp",
            "Group": "Servers",
            "Host": "db",
            "Port": 5432,
            "MaintenanceDB": "postgres",
            "Username": "${DB_USERNAME}",
            "SavePassword": true
          }
        }
      }