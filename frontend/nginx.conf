worker_processes  1;
error_log         /var/log/nginx/error.log warn;
pid               /tmp/nginx.pid;

events {
  worker_connections  1024;
}

http {
  include           /etc/nginx/mime.types;
  default_type      application/octet-stream;
  sendfile          on;
  keepalive_timeout 65;
  access_log        off;
  
  client_body_temp_path /tmp/client_temp;
  proxy_temp_path       /tmp/proxy_temp_path;
  fastcgi_temp_path     /tmp/fastcgi_temp;
  uwsgi_temp_path       /tmp/uwsgi_temp;
  scgi_temp_path        /tmp/scgi_temp;

  map $http_origin $cors_header_origin {
    default "";
    "~^https?://(.*\.)?MYCOMPANY\.se(:[0-9]+)?/?" "$http_origin";
  }

  server {
    listen      8081;
    server_name localhost;
    root        /app;

    add_header Cache-Control "no-cache, private";
    add_header Access-Control-Allow-Origin $cors_header_origin;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Server "";

    location ~ ^/ihpappbackend(/rest/.*)$ {
      rewrite ^/ihpappbackend(/rest/.*)$ $1 break;

      proxy_pass http://backend:8080;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
}

    location / {
      index     index.html;
      try_files $uri $uri/ /index.html;
    }

        # Serve the React application from the /ihpapp subpath
    location /ihpapp/ {
      alias /app/;
      index index.html;
      try_files $uri $uri/ /ihpapp/index.html;
    }

    location ~* ^/(img)/ {
      add_header Cache-Control "public, max-age=604800";
      add_header Access-Control-Allow-Origin $cors_header_origin;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";
      add_header X-XSS-Protection "1; mode=block";
      add_header X-Frame-Options "SAMEORIGIN";
      add_header X-Content-Type-Options "nosniff";
      add_header Server "";
    }

    location /ihpapp {
      index   index.html index.htm;
    }

    location /ping {
      default_type application/json;
      access_log off;
      log_not_found off;
      return 200 '{ "system":"ihpapp", "status":"UP", "errors": []}';
     }

    location /actuator/health/readiness {
      default_type application/json;
      access_log off;
      log_not_found off;
      return 200 '{"status": "UP", "components": {"readinessState": { "status": "UP" }}}';
     }

    location /actuator/health/liveness {
      default_type application/json;
      access_log off;
      log_not_found off;
      return 200 '{"status":"UP"}';
     }
  }
}
