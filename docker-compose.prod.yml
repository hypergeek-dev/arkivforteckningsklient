# docker-compose.prod.yml — Produktionskonfiguration
#
# Startas med:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# Skillnader mot docker-compose.yml (dev):
#   - Ingen pgAdmin
#   - Databasen exponeras inte utanför Docker-nätverket
#   - Backend exponeras inte utanför Docker-nätverket
#   - restart: unless-stopped på alla tjänster
#   - Frontend exponeras på port 80 (konfigurerbart via FRONTEND_PORT)
#
# Sätt LISTEN_HOST=127.0.0.1 om en extern nginx hanterar TLS-terminering.

services:
  db:
    image: postgres:16.9
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ihp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ihp"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_JDBC_URL: jdbc:postgresql://db:5432/ihp
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${LISTEN_HOST:-0.0.0.0}:${FRONTEND_PORT:-80}:8081"
    depends_on:
      - backend

volumes:
  postgres_data:
